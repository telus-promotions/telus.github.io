<script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"genericPageTemplate":{"metadata":{"tags":[],"concepts":[],"legal":{"price-lock":{"index":0,"key":"price-lock","value":"Offer subject to change without notice. The Rate Plan Price Lock (“Lock”) applies to the Monthly Charge for eligible post-paid mobility plans, before any applicable taxes, other government imposed fees, discounts, promotions and bill credits, for a duration of 5 years starting from the time of eligible plan activation. Prices of features, add-ons and pay-per-use rates, including, but not limited to, Easy Roam® rates, are not guaranteed during the 5-year Lock period and are subject to change. The Lock may be removed upon rate plan change or renewal or if the customer no longer meets the eligibility criteria."},"addmob15":{"index":1,"key":"addmob15","value":"Offer is subject to change without notice. Available to TELUS residential customers who are subscribed to qualifying Internet, Optik TV, Smart Home Security and/or Home Phone services when activating on select 5G+ rate plans. Cannot be combined with promotional offers not mentioned in this advertisement. A $15/mo. discount will apply to the rate plan of your primary line on the account as long as eligibility requirements are met or until the discount is no longer maintained. Discounts, promotions, benefits and credits are earned for each full month of service and do not apply to partial billing periods. Consumer accounts only. Bill discount will be applied upon order completion and will appear on your first bill after activation. Bill discounts are non-transferable, can only be applied to pay for services charges, and carry no cash value after deactivating your services. Consumer accounts only. Bill discount will be applied upon order completion and will appear on your first bill after activation. Bill discounts are non-transferable, can only be applied to pay for services charges, and carry no cash value after deactivating your services. \n\nOffer is not transferable, and only available to the intended recipient of this email. Offer is available for a limited time. TELUS reserves the right to remove or amend the offer at any time. A one-time connection fee of $80 applies to in-store and call center upgrades and activations, connection fee is subject to change without notice. TELUS will assess you for the Mobile and Home eligibility based upon your current rate plan, and if you are deemed to qualify for a Mobile and Home credit, we will apply it to your account. If you change your rate plan following our initial assessment, your bill credit may be removed. Learn more about saving when you \u003ca href=\"https://www.telus.com/en/deals-and-bundles/internet-tv-phone\"\u003ebundle your services at TELUS\u003c/a\u003e.\n"},"mob-5g-select-rate":{"index":2,"key":"mob-5g-select-rate","value":"5G access requires a compatible device and connection to TELUS' 5G network where available. Speed and signal strength may vary with your device, configuration, Internet traffic, environmental conditions, applicable network management and other factors. For more information, visit \u003ca href=\"https://www.telus.com/en/mobility/network/coverage-map\"\u003etelus.com/coverage\u003c/a\u003e. Data speeds reduced to a maximum of 512Kbps after your included high-speed data bucket is exhausted. Speed may vary with your device, internet traffic, environmental conditions, and other factors. Please refer to TELUS’ Fair Use Policy at \u003ca href=\"https://www.telus.com/en/support/article/telus-fair-use-policy?INCTMP=VAN_fairusepolicy\"\u003etelus.com/fairusepolicy\u003c/a\u003e for further information."},"pre-auth-payment-discounts":{"index":3,"key":"pre-auth-payment-discounts","value":"Offer subject to change without notice. Available to customers who subscribe to eligible plans and enroll with pre-authorized bank payments. The monthly discount will only apply to eligible plans and you must keep pre-authorized bank payments active to maintain the discount. If you or TELUS remove pre-authorized bank payments the plan will no longer be eligible for the monthly discount. All prices do not include applicable taxes.\nDiscounts, promotions, benefits and credits are earned for each full month of service and do not apply to partial billing periods."},"3-gig-5yrs-plan-lock":{"index":4,"key":"3-gig-5yrs-plan-lock","value":"Offer subject to change without notice. Available to new and existing TELUS customers who have not subscribed to internet in the past 90 days and activate an eligible internet plan on a 2 year term. The Plan Price Lock Discount (“Lock”) applies to the monthly regular price for eligible internet plans, before any applicable taxes, other government imposed fees, discounts, promotions and bill credits, for 5 years starting from the time of eligible plan activation. Prices of features, select add-ons and pay-per-use rates are not guaranteed during the Lock period and are subject to change. After the Lock period, in-market regular pricing applies and is subject to change. The Lock may be removed upon internet plan change or renewal or if you no longer meet the eligibility criteria."},"mob-samsung-s26":{"index":5,"key":"mob-samsung-s26","value":"Offer subject to change without notice. Available while quantities last and expire 23:59 April 2, 2026. Available to new post-paid activations, renewals and add a line customers, with the purchase of an eligible Samsung Galaxy S26, 26+, 26 Ultra on a 2-year TELUS Easy Payment term. Subject to approved credit with a 24-month Easy Payment agreement (0% APR) on an in-market plan with data and voice included. Easy Payment balance will be repaid over a 24-month period via equal monthly payments. Payment of any outstanding Easy Payment balance due upon termination, or account transfer. Applicable taxes are calculated based on the total no term price less any device discounts and must be paid in full at the time of purchase. Pay-per-use charges (including long distance, roaming and additional airtime or data) are extra. A monthly rate plan is charged in addition to the 24-month Easy Payment plan. A one-time connection fee of $80 applies to in-store and call center upgrades and activations. Connection fee is subject to change without notice. Consumer and Exclusive Partner Program (“EPP”) accounts only. Proof of eligible employment required for all EPP offers. Offer available only to Canadian residents with Canadian shipping addresses. Offer cannot be combined with any other promotions, is non-transferable, and isn’t valid for cash or a cash equivalent. Galaxy Watch8 is $0 upfront plus tax and $0/mo on a 2-year TELUS Easy Payment plan. Once the purchase price has been paid, the watch plan service will continue on a month-to-month basis. A monthly watch rate plan, currently $15/mo, is charged in addition to the 24-month Easy Payment plan. Watch8 monthly device discount can only be used towards the Samsung Galaxy Watch8, is non-refundable and carries no cash value.\nCustomers will receive a notification with instructions on how to redeem the Samsung Galaxy Watch8 offer within 4 to 6 weeks after receiving the mobile device. Watch 8 monthly device discount can only be used towards the Samsung Galaxy Watch8, is non-refundable and carries no cash value.\n"},"mob-0-easypay":{"index":6,"key":"mob-0-easypay","value":"Subject to approved credit with a 24-month TELUS Easy Payment® agreement (0% APR) on any in-market plan with data and voice included. TELUS Easy Payment® balance will be repaid over a 24 month period via equal monthly payments. Payment of any outstanding TELUS Easy Payment® balance due upon termination, or account transfer. Applicable taxes are calculated based on the total no term price less any device discounts and must be paid in full at the time of purchase. Pay-per-use charges (including long distance, roaming and additional airtime or data) are extra."},"mob-bib-ti":{"index":7,"key":"mob-bib-ti","value":"Devices purchased on the Bring-It-Back program must be returned in good working condition or you will be responsible for the difference between the Bring-It-Back program amount and the lower trade-in value for a device that is not in good working condition. Trade-in standards published at the time a device is returned will apply. Applicable sales taxes are due at time of purchase on the full purchase price. You will not be charged tax on the Bring-It-Back Program Amount if you choose to keep your device and pay back the Bring-It-Back Program Amount at, or before, the end of the 24 month term. Bring-It-Back program is only available while you subscribe to mobility service. If mobility service is cancelled before the end of the term, the Bring-It-Back Program Amount will be charged to your TELUS bill."},"streaming-bundle-terms":{"index":8,"key":"streaming-bundle-terms","value":"Offer and regular pricing subject to change without notice and available only to eligible TELUS customers who are new Stream+ subscribers. Eligible Stream+ Basic subscribers receive a $13/month discount for 3 months, provided the eligibility requirements are met. Subscription auto-renews. Must be a Canadian resident not currently subscribed to Stream+ with Netflix, Disney+ and Amazon Prime. Eligibility may vary for customers in certain regions due to their connection type. All prices do not include applicable taxes. Only one Stream+ activation can be completed per MyTELUS account. Stream+ Basic includes: Netflix Standard with ads, Disney+ Standard with ads and Amazon Prime (ad supported). Regular price for Stream+ Basic is $23.00 plus applicable taxes and subject to change. Offer cannot be combined with other promotions. Account activation with Netflix, Amazon and Disney (the “Provider(s)”) is required and your use of these services is subject to each Provider’s applicable terms and conditions and privacy policy. If you have an existing account with any Provider, you must cancel it with this Provider and then redeem this offer in order to avoid double billing. Other conditions apply. Please review the full terms and conditions: \u003ca href=\"https://www.telus.com/streamplusterms\"\u003ehttps://www.telus.com/streamplusterms\u003c/a\u003e."},"streaming-bundle-apple-tv":{"index":9,"key":"streaming-bundle-apple-tv","value":"Offer subject to change without notice and includes a $3.49 discount on Apple TV for the first 3 months. In addition, eligible Stream+ customers receive a $1.50/mo discount on Apple TV for as long as the eligibility requirements are met or until the discount is no longer maintained.Regular price of Apple TV is currently $14.99. All prices do not include applicable taxes.  Existing or new Apple TV subscription activation required. Apple TV plans and pricing are subject to change without notice. Apple TV is a service mark of Apple Inc., registered in the U.S. and other countries and regions. Additional Terms and Apple Privacy Policy apply; see the applicable terms for your country at \u003ca href=\"https://www.apple.com/ca/legal/internet-services/itunes/ca/terms.html\"\u003ehttps://www.apple.com/ca/legal/internet-services/itunes/ca/terms.html\u003c/a\u003e. Must be 13+ years old and in Canada. Compatible products and services required.Ultra high-definition availability is subject to rate plan selection, internet service, device capability and content availability. Not all content is available in 4K or 4K HDR. 4K resolution requires a 4K‑capable device. Accessing Dolby Atmos features requires a Dolby Atmos–capable system. Playback quality will depend on hardware and internet connection. Other conditions apply. Please review the full terms and conditions \u003ca href=\"https://www.telus.com/en/support/article/telus-apple-tv-plus-subscription-terms-conditions\"\u003ehere\u003c/a\u003e."},"easyroam5":{"index":10,"key":"easyroam5","value":"Offer subject to change without notice. Access data from your plan and enjoy unlimited talk and text in the US and in over 200 international destinations. Easy Roam is an optional travel feature subject to change without notice, including coverage, rates and usage allowances. See \u003ca href=\"https://www.telus.com/mobility/travel\"\u003eTELUS.com/travel\u003c/a\u003e for destinations and more information on Easy Roam, including how to enable Easy Roam.\n\nAll prices do not include applicable taxes. Voicemail notifications may not be available in all travel destinations. International Travel charges may take up to 90 days to appear on your bill depending on the destination you travel to.\n\nNote for existing customers who are changing their plan to an eligible 5G+ Complete plan:\nIt may take up to 30 days to apply the $5 per day Easy Roam offer to your line, if applicable - if you are planning to travel in under 30 days, contact us to determine availability and eligibility for having the offer applied: \u003ca href=\"https://www.telus.com/support/contact-us\"\u003etelus.com/support/contact-us\u003c/a\u003e."},"mobile-klinik":{"index":11,"key":"mobile-klinik","value":"Subject to technician and part availability. Peak business periods may affect availability. Customers must complete the initial assessment 2 hours prior to location closing hours. Some repairs are not eligible."},"5g-speed":{"index":12,"key":"5g-speed","value":"5G access requires a compatible device and connection to TELUS' 5G network where available. Speed and signal strength may vary with your device, configuration, Internet traffic, environmental conditions, applicable network management and other factors. For more information, visit \u003ca href=\"http://www.telus.com/coverage\"\u003etelus.com/coverage\u003c/a\u003e.\nData speeds reduced to a maximum of 512Kbps after your included high-speed data bucket is exhausted. Speed may vary with your device, internet traffic, environmental conditions, and other factors. Please refer to TELUS’ Fair Use Policy at \u003ca href=\"http://www.telus.com/fairusepolicy\"\u003etelus.com/fairusepolicy\u003c/a\u003e for further information."},"globalroam":{"index":13,"key":"globalroam","value":"Eligible coverage destinations are subject to change. Current eligible destinations included: \n\nUS Destinations: The U.S. (including areas of Alaska, Hawaii, Puerto Rico and the Virgin Islands). \nMexico/Caribbean: Aruba, Bahamas, Barbados, Cuba, Dominican Republic, Guyana, Jamaica, Mexico, Netherlands Antilles, St Lucia, Trinidad and Tobago, Turks \u0026 Caicos.\nCentral \u0026 South America: Argentina, Brazil, Chile, Colombia, Costa Rica, Panama, Peru.\nEurope: Austria, Belgium, Croatia, Cyprus, Czech Republic, Denmark, France, Germany, Greece, Hungary, Iceland, Ireland, Italy, Netherlands, Norway, Poland, Portugal, Romania, Serbia, Slovenia, Spain, Sweden, Switzerland, Ukraine, United Kingdom.\nAsia \u0026 Middle East: China, Hong Kong, India, Indonesia, Israel, Japan, Malaysia, Pakistan, Philippines, Qatar, Saudi Arabia, Singapore, South Korea, Sri Lanka, Taiwan, Thailand, Turkey, United Arab Emirates, Vietnam.\nOceania: Australia, Fiji, and New Zealand.\n\nCalls must be made to and from phone numbers in Canada and the other destinations included in your plan. Calls to numbers outside of Canada and the 68 destinations included are subject to standard pay-per-use rates. Roaming outside the included destinations is subject to roaming pay-per-use rates. Excludes premium texts. Other text messages such as texts sent to any of the 68 destinations, while in any of the 68 destinations are included."},"smartenergy-device-credit":{"index":14,"key":"smartenergy-device-credit","value":"Offer subject to change without notice. Available to residential customers who have not subscribed to TELUS SmartEnergy in the last 12 months. A one-time discount of $75 applies to the purchase of SmartHome+ or SmartEnergy compatible devices for new customers who have subscribed to the SmartEnergy plan at the time of the order. The discount will be applied before taxes against the total price of selected devices when added in your cart at the time of your subscription to SmartEnergy. If the device total in cart is less than the discount amount or if no device is added to your cart at the time of your service subscription, then any remaining balance of discount will be forfeit. Device discount is non-transferable and cannot be exchanged for cash. All prices do not include applicable taxes. Subscription must be kept for 24 months otherwise upon cancellation you will be charged a fee reflecting a portion of promotional discounts(s) previously applied to your device(s), residents of Penticton, BC are exempt from this charge, as they can cancel any time without further charge due to an agreement between TELUS and the City of Penticton. Offer expires April 1, 2026. Current regular pricing can be viewed at telus.com/smartenergy. Regular pricing subject to change without notice."}},"nonIndexedLegal":{}},"sys":{"space":{"sys":{"type":"Link","linkType":"Space","id":"fltupc9ltp8m"}},"id":"3Af3w9WIq1e2W2RjJqTeG3","type":"Entry","createdAt":"2023-01-27T00:32:35.550Z","updatedAt":"2025-11-18T14:00:07.878Z","environment":{"sys":{"id":"master","type":"Link","linkType":"Environment"}},"publishedVersion":389,"revision":25,"contentType":{"sys":{"type":"Link","linkType":"ContentType","id":"genericPageTemplate"}},"locale":"en-CA-BC"},"fields":{"entryTitle":"Homepage ","slug":"/","seo":{"metadata":{"tags":[],"concepts":[]},"sys":{"space":{"sys":{"type":"Link","linkType":"Space","id":"fltupc9ltp8m"}},"id":"45mn5DKjq2QvDyLlqtKiOO","type":"Entry","createdAt":"2023-01-24T23:55:37.796Z","updatedAt":"2026-02-18T14:43:52.779Z","environment":{"sys":{"id":"master","type":"Link","linkType":"Environment"}},"publishedVersion":95,"revision":13,"contentType":{"sys":{"type":"Link","linkType":"ContentType","id":"seoTags"}},"locale":"en-CA-BC"},"fields":{"entryTitle":"Homepage Redesign - SEO","title":"Phones, Internet and TV on the most-awarded networ
