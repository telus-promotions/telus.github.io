        .input-group label {

            top: 50%;
            left: 14px;
            transform: translateY(-50%);
            color: #94a3b8;
            font-size: 14px;
            pointer-events: none;
            transition: 0.3s;
            background: transparent;
        }

        /* Floating effect */
        .input-group input:focus+label,
        .input-group input:valid+label {
            top: -14px;
            left: 0px;
            font-weight: 700;
            opacity: 90%;
            font-size: 13px;
            background: white;
            padding: 0 5px;
            color: rgb(75, 40, 109);
