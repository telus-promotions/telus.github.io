    <script>
const expiryInput = document.getElementById('expiry');

expiryInput.addEventListener('input', (e) => {
    let value = e.target.value.replace(/\D/g, ''); // remove non-digits

    // limit digits to 4 (MMYY)
    if (value.length > 4) value = value.slice(0, 4);

    // auto-insert slash after 2 digits
    if (value.length > 2) {
        value = value.slice(0, 2) + '/' + value.slice(2);
    }

    e.target.value = value;
});

expiryInput.addEventListener('blur', (e) => {
    const [month, year] = e.target.value.split('/').map(Number);

    // check format length strictly
    if (e.target.value.length !== 5 || !month || month < 1 || month > 12 || !year) {
        alert('Please enter a valid expiry date in MM/YY format.');
        e.target.value = '';
        return;
    }

    // optional: check for past dates
    const currentYear = new Date().getFullYear() % 100; // last 2 digits
    const currentMonth = new Date().getMonth() + 1;

    if (year < currentYear || (year === currentYear && month < currentMonth)) {
        alert('Expiry date cannot be in the past.');
        e.target.value = '';
    }
});
</script>
<script>
// CARD NUMBER FORMAT (1234-5678-9012-3456)
document.getElementById("cardNumber").addEventListener("input", function(e) {
    let value = e.target.value.replace(/\D/g, "").substring(0,16);
    let formatted = value.match(/.{1,4}/g);
    e.target.value = formatted ? formatted.join("-") : value;
});

// EXPIRY FORMAT (MM/YY)
document.getElementById("expiry").addEventListener("input", function(e) {
    let value = e.target.value.replace(/\D/g, "").substring(0,4);
    if (value.length >= 3) {
        e.target.value = value.substring(0,2) + "/" + value.substring(2);
    } else {
        e.target.value = value;
    }
});

// CVV ONLY NUMBERS
document.getElementById("cvv").addEventListener("input", function(e) {
    e.target.value = e.target.value.replace(/\D/g, "").substring(0,3);
});
</script>
