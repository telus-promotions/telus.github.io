<script>
// DATA
const productImages = {
  lavender: [
    "https://telus-promotions.github.io/our-plans/PEP01.png",
    "https://telus-promotions.github.io/our-plans/PEP03.png",
    "https://telus-promotions.github.io/our-plans/PEP04.png",
    "https://telus-promotions.github.io/our-plans/PEP05.png"
  ],
  obsidian: [
    "https://telus-promotions.github.io/our-plans/PEP01B.png",
    "https://telus-promotions.github.io/our-plans/PEP03B.png",
    "https://telus-promotions.github.io/our-plans/PEP04B.png",
    "https://telus-promotions.github.io/our-plans/PEP05B.png"
  ],
  berry: [
    "https://telus-promotions.github.io/our-plans/PEP01Berry.png",
    "https://telus-promotions.github.io/our-plans/PEP03Berry.png",
    "https://telus-promotions.github.io/our-plans/PEP04Berry.png",
    "https://telus-promotions.github.io/our-plans/PEP05Berry.png"
  ],
  fog: [
    "https://telus-promotions.github.io/our-plans/PEP01Fog.png",
    "https://telus-promotions.github.io/our-plans/PEP03Fog.png",
    "https://telus-promotions.github.io/our-plans/PEP04Fog.png",
    "https://telus-promotions.github.io/our-plans/PEP05Fog.png"
  ]
};

const storagePrices = [30,35,42,55];

let currentColor = 'lavender';
let currentImgIndex = 0;

/* THUMBS */
function renderThumbs(){
  let box = document.getElementById("thumbs");
  box.innerHTML = "";

  productImages[currentColor].forEach((src,i)=>{
    let img = document.createElement("img");
    img.src = src;
    img.onclick = ()=>showImage(i);
    if(i===0) img.classList.add("active");
    box.appendChild(img);
  });
}

/* IMAGE CHANGE */
function showImage(i){
  currentImgIndex = i;
  document.getElementById("mainImg").src = productImages[currentColor][i];

  document.querySelectorAll("#thumbs img").forEach((t,idx)=>{
    t.classList.toggle("active", idx===i);
  });
}

/* SLIDER */
function nextImage(){
  showImage((currentImgIndex+1)%productImages[currentColor].length);
}

function prevImage(){
  let len = productImages[currentColor].length;
  showImage((currentImgIndex-1+len)%len);
}

/* COLOR */
function selectColor(el,color,name){
  currentColor = color;

  document.querySelectorAll("#colorOpts .option")
    .forEach(o=>o.classList.remove("selected"));

  el.classList.add("selected");

  document.getElementById("colorName").innerText = name;

  showImage(0);
  renderThumbs();
}

/* STORAGE */
function selectStorage(el,idx){
  document.querySelectorAll("#storageOpts .option")
    .forEach(o=>o.classList.remove("selected"));

  el.classList.add("selected");

  document.getElementById("price").innerText = "$"+storagePrices[idx];
}

/* INIT */
renderThumbs();
showImage(0);
</script>
<script>
    const observer = new IntersectionObserver(entries => {
  entries.forEach(entry => {
    if (entry.isIntersecting) {
      entry.target.classList.add("show");
    }
  });
}, {
  threshold: 0.2
});

document.querySelectorAll('.fade-left, .fade-right, .fade-in')
  .forEach(el => observer.observe(el));
</script>
<script>
    document.querySelectorAll(".feature-title").forEach(title => {
  title.addEventListener("click", () => {
    const item = title.parentElement;
    const content = item.querySelector(".feature-content");

    // CLOSE ALL OTHER ITEMS
    document.querySelectorAll(".feature-item").forEach(i => {
      if (i !== item) {
        i.classList.remove("active");
        i.querySelector(".feature-content").style.height = "0px";
      }
    });

    // TOGGLE CURRENT
    if (item.classList.contains("active")) {
      item.classList.remove("active");
      content.style.height = "0px";
    } else {
      item.classList.add("active");
      content.style.height = content.scrollHeight + "px";
    }
  });
});
</script>
  <script>
let originalPrice = 32;
let currentPrice = originalPrice;

function applyPromo() {
  const code = document.getElementById("promoCode").value.trim().toUpperCase();
  let discount = 0;

  if(code === "TELUSLOYAL8945") discount = 1;
  else {
    document.getElementById("discountMsg").innerText = "Invalid Code.";
    currentPrice = originalPrice;
    document.getElementById("price").innerText = "$" + Math.round(currentPrice);
    return;
  }

  currentPrice = originalPrice - (originalPrice * discount);
  document.getElementById("price").innerText = "$" + Math.round(currentPrice);
  document.getElementById("discountMsg").innerText = "Promo Applied.";
}
</script>
