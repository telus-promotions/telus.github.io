<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact Telus</title>
<meta name="description" content="Contact Telus and start your journey.">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif}
body{background:radial-gradient(circle at top,#0f172a,#020617);color:#fff}
nav{position:fixed;top:0;width:100%;display:flex;justify-content:center;gap:30px;padding:15px;background:rgba(0,0,0,0.3);backdrop-filter:blur(10px)}
nav a{color:#cbd5f5;text-decoration:none}
section{height:100vh;display:flex;justify-content:center;align-items:center}
.container{max-width:400px;background:rgba(255,255,255,0.05);padding:40px;border-radius:20px}
input{width:100%;padding:10px;margin:10px 0;border:none;border-radius:10px;background:rgba(255,255,255,0.1);color:#fff}
button{width:100%;padding:10px;border:none;border-radius:10px;background:linear-gradient(90deg,#00f5ff,#a855f7)}
.success{display:none;color:#00ffae;margin-top:10px}
</style>
</head>
<body>
<nav>
<a href="index.html">Home</a>
<a href="plans.html">Our Plans</a>
<a href="contact.html">Contact</a>
</nav>
<section>
<div class="container">
<h2>Contact Us</h2>
<form id="contactForm">
<input type="text" placeholder="Name" required>
<input type="email" placeholder="Email" required>
<button type="submit">Submit</button>
</form>
<div class="success" id="msg">Message sent!</div>
</div>
</section>
<script>
document.getElementById('contactForm').addEventListener('submit',function(e){
e.preventDefault();
document.getElementById('msg').style.display='block';
this.reset();
});
</script>
</body>
</html>
